<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA STORE | Premium Physical Store</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b14">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { animation: { 'fade-in': 'fadeIn 0.5s ease-in-out', 'bounce-short': 'bounce 0.5s ease-in-out 1' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. Theme Variables for Light/Dark Mode */
        :root { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; --glass: rgba(255,255,255,0.9); }
        .dark { --bg: #050b14; --text: #e2e8f0; --card: #1e293b; --border: #334155; --glass: rgba(15,23,42,0.85); }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 80px; transition: background-color 0.5s, color 0.5s; overflow-x: hidden; }
        @media (min-width: 768px) { body { padding-bottom: 0; } }

        /* 2. Splash Screen */
        #splashScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; items-center; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        
        /* 3. Neon Glow & Hover */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .product-card { background: var(--card); border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px) scale(1.02); border-color: #3b82f6; box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15); }
        
        .drawer-closed { transform: translateX(100%); } .drawer-open { transform: translateX(0); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
        
        .r-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; letter-spacing: 1px; margin-left: 6px; display: inline-block; }
        .badge-admin { background: linear-gradient(135deg, #ef4444, #991b1b); color: white; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .badge-basic { background: linear-gradient(135deg, #94a3b8, #475569); color: white; }
        
        .variant-select { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px; rounded: 8px; outline: none; font-size: 12px; font-weight: bold; width: 100%; }
        
        /* 4. Timeline Progress */
        .timeline-step { width: 1.5rem; height: 1.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .t-active { background: #10b981; color: white; box-shadow: 0 0 10px #10b981; }
        .t-inactive { background: var(--border); color: #94a3b8; }
        .t-line { flex-1; height: 4px; background: var(--border); margin: 0 8px; border-radius: 2px; }
        .t-line.active { background: #10b981; }

        /* Floating Actions */
        .fab { position: fixed; right: 20px; z-index: 45; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #btnScrollTop { bottom: 90px; background: #3b82f6; color: white; opacity: 0; pointer-events: none; }
        #btnScrollTop.visible { opacity: 1; pointer-events: auto; }
        @media (min-width: 768px) { #btnScrollTop { bottom: 30px; right: 30px; } }
    </style>
</head>
<body class="dark"> <div id="splashScreen"><div class="spinner"></div></div>

    <div id="flashBanner" class="bg-gradient-to-r from-red-600 to-rose-500 text-white text-xs sm:text-sm font-bold py-2 text-center shadow-lg relative z-50">
        <i class="fa-solid fa-bolt animate-pulse text-yellow-300 mr-2"></i> Flash Sale Ends In: <span id="countdownTimer" class="font-mono text-yellow-300 text-lg ml-2">00:00:00</span>
    </div>

    <div id="noticeBanner" class="hidden bg-gradient-to-r from-blue-700 to-indigo-800 text-white text-xs sm:text-sm font-bold py-1.5 shadow-lg overflow-hidden relative z-40 border-b border-indigo-400">
        <div class="max-w-7xl mx-auto flex items-center px-4"><i class="fa-solid fa-bullhorn animate-pulse mr-3 text-yellow-300"></i><marquee id="noticeText" scrollamount="5" class="flex-1 tracking-widest uppercase"></marquee></div>
    </div>

    <nav class="glass sticky top-0 z-50 w-full h-16 sm:h-20 flex items-center px-4 shadow-lg">

            </div>
            
            <div class="flex items-center gap-3">

            </div>
        </div>
    </nav>

    <button onclick="openFeedback()" class="fab" style="bottom: 90px; left: 20px; right: auto; background: #4f46e5; color: white;" title="Give Feedback"><i class="fa-solid fa-comment-dots text-xl"></i></button>
    
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="btnScrollTop" class="fab"><i class="fa-solid fa-arrow-up"></i></button>

    <div class="pt-10 pb-10 text-center relative z-10 px-4">
        <h1 class="text-4xl sm:text-6xl font-black mb-6 tracking-tight animate-fade-in">Premium <span class="text-blue-500">Collections</span></h1>
        
        <div class="max-w-xl mx-auto relative group">

        <button onclick="toggleWishlistView()" id="wishlistBtnFilter" class="bg-rose-500/10 text-rose-500 border border-rose-500/30 px-4 py-2 rounded-full font-bold text-sm hover:bg-rose-500 hover:text-white transition-colors"><i class="fa-solid fa-heart mr-1"></i> View Wishlist</button>
    </div>

    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-10 min-h-[50vh]" id="product-list">
        <div class="product-card p-4 animate-pulse"><div class="w-full h-56 bg-slate-300 dark:bg-slate-700 rounded-xl mb-4"></div><div class="w-3/4 h-6 bg-slate-300 dark:bg-slate-700 mb-2 rounded"></div><div class="w-1/2 h-8 bg-slate-300 dark:bg-slate-700 rounded"></div></div>

    <div id="cartDrawer" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-[var(--card)] border-l border-[var(--border)] z-[70] drawer-closed transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-[var(--border)] flex justify-between items-center"><h2 class="text-2xl font-black text-[var(--text)]"><i class="fa-solid fa-cart-shopping mr-2 text-blue-500"></i> My Cart</h2><button onclick="toggleCart()" class="w-10 h-10 bg-slate-200 dark:bg-slate-800 rounded-full hover:bg-red-500 hover:text-white transition-colors text-[var(--text)]"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">

                    <input type="text" id="cStreet" placeholder="House/Street/Village" class="w-full bg-[var(--card)] border border-[var(--border)] rounded-xl px-4 py-3 font-bold outline-none focus:border-blue-500 text-[var(--text)]">
                    <div class="flex gap-2"><input type="text" id="cCity" placeholder="City/District" class="w-full bg-[var(--card)] border border-[var(--border)] rounded-xl px-4 py-3 font-bold outline-none focus:border-blue-500 text-[var(--text)]"><input type="text" id="cZip" placeholder="Postcode" class="w-24 bg-[var(--card)] border border-[var(--border)] rounded-xl px-4 py-3 font-bold outline-none focus:border-blue-500 text-[var(--text)]"></div>

            <div class="flex justify-between items-center mb-4 pb-4 border-b border-[var(--border)]"><span class="font-bold text-sm text-slate-500">Advance Booking:</span><span id="cartAdvance" class="font-black text-emerald-500 text-lg">- ৳0</span></div>
            <div class="flex justify-between items-center mb-6"><span class="font-black uppercase tracking-widest text-[var(--text)]">Due (COD):</span><span id="cartDue" class="text-3xl font-black text-blue-500">৳0</span></div>
            <button onclick="processOrder()" id="btnConfirmOrder" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-transform active:scale-95"><i class="fa-solid fa-check-circle mr-2"></i> Confirm Order</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/80 hidden z-[80] justify-center items-center px-4 backdrop-blur-sm">
        <div class="bg-[var(--card)] w-full max-w-2xl max-h-[90vh] flex flex-col relative border border-[var(--border)] shadow-2xl overflow-hidden rounded-[32px]">
            <div class="p-6 border-b border-[var(--border)] flex justify-between items-center bg-[var(--bg)]"><h2 class="text-2xl font-black text-[var(--text)]"><i class="fa-solid fa-user text-blue-500 mr-2"></i> Account</h2><button onclick="closeProfile()" class="w-10 h-10 bg-slate-200 dark:bg-slate-800 text-[var(--text)] hover:bg-red-500 hover:text-white rounded-full transition-colors"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="flex border-b border-[var(--border)] bg-[var(--card)] px-6 pt-4 gap-6 overflow-x-auto custom-scrollbar"><button onclick="switchProfTab('overview')" id="tab-overview" class="prof-tab active pb-3 font-bold text-sm uppercase tracking-widest whitespace-nowrap text-blue-500 border-b-2 border-blue-500">Profile</button><button onclick="switchProfTab('orders')" id="tab-orders" class="prof-tab text-slate-500 pb-3 font-bold text-sm uppercase tracking-widest whitespace-nowrap border-b-2 border-transparent">My Orders</button><button onclick="switchProfTab('funds')" id="tab-funds" class="prof-tab text-slate-500 pb-3 font-bold text-sm uppercase tracking-widest whitespace-nowrap border-b-2 border-transparent">Wallet</button><button onclick="switchProfTab('settings')" id="tab-settings" class="prof-tab text-slate-500 pb-3 font-bold text-sm uppercase tracking-widest whitespace-nowrap border-b-2 border-transparent">Settings</button></div>
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-[var(--bg)] text-[var(--text)]">

                    <div class="bg-[var(--card)] p-5 rounded-2xl border border-[var(--border)] flex justify-between items-center text-left shadow-sm"><div><p class="text-xs text-slate-500 font-bold uppercase mb-1">Referral Code</p><p class="text-2xl font-mono font-black text-emerald-500" id="pRef">---</p></div><div class="text-right"><span class="text-xs font-bold text-emerald-600 bg-emerald-500/10 px-3 py-1 rounded-full">Earn ৳100 / Deposit</span></div></div>

                    <div><label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Email</label><input type="email" id="setEmail" class="w-full bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-xl px-4 py-3 font-bold outline-none focus:border-blue-500"></div>
                    <div><label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Password</label><input type="password" id="setPass" placeholder="Leave blank to keep current" class="w-full bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-xl px-4 py-3 font-bold outline-none focus:border-blue-500"></div>
                    <button onclick="saveSettings()" id="btnSaveSet" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase mt-4 shadow-lg">Save Changes</button>

    <div id="fundModal" class="fixed inset-0 bg-black/80 hidden z-[90] justify-center items-center px-4 backdrop-blur-sm">
        <div class="bg-[var(--card)] rounded-[32px] w-full max-w-md shadow-2xl relative overflow-hidden border border-[var(--border)]">
            <div id="fundHeader" class="p-6 flex justify-between items-center text-white shadow-md bg-blue-600"><h2 class="text-2xl font-black"><i id="fundIcon" class="fa-solid fa-wallet mr-2"></i> Add Balance</h2><button onclick="closeFund()" class="w-8 h-8 bg-black/20 hover:bg-black/40 rounded-full transition-colors"><i class="fa-solid fa-xmark"></i></button></div>
            <form id="depositForm" class="p-6 space-y-5 bg-[var(--bg)] text-[var(--text)]">
                <div><label class="block text-[10px] font-black text-slate-500 uppercase mb-3">Select Method</label><div class="grid grid-cols-2 gap-3"><label class="cursor-pointer"><input type="radio" name="method" value="bkash" class="peer sr-only" checked onchange="updateFundUI()"><div class="py-3 text-center border-2 border-[var(--border)] rounded-xl font-black text-slate-500 peer-checked:border-[#e2136e] peer-checked:text-[#e2136e] peer-checked:bg-[#e2136e]/10 text-xs uppercase tracking-widest transition-all">bKash</div></label><label class="cursor-pointer"><input type="radio" name="method" value="nagad" class="peer sr-only" onchange="updateFundUI()"><div class="py-3 text-center border-2 border-[var(--border)] rounded-xl font-black text-slate-500 peer-checked:border-[#f37021] peer-checked:text-[#f37021] peer-checked:bg-[#f37021]/10 text-xs uppercase tracking-widest transition-all">Nagad</div></label></div></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Amount (৳)</label><input type="number" id="fBdt" required class="w-full bg-[var(--card)] border border-[var(--border)] text-emerald-500 rounded-xl px-4 py-3 font-black text-xl outline-none focus:border-blue-500"></div>
                <div class="bg-[var(--card)] p-5 rounded-2xl border border-[var(--border)]"><p class="text-xs font-black text-slate-500 uppercase mb-2">Send Money To:</p><div onclick="copyNumber()" class="bg-[var(--bg)] border border-[var(--border)] px-4 py-3 rounded-xl flex justify-between items-center cursor-pointer hover:border-blue-500"><span id="fNumber" class="font-mono text-xl font-black tracking-widest">01846849460</span><i class="fa-regular fa-copy text-blue-500"></i></div></div>
                <div class="space-y-3"><input type="text" id="fSender" required class="w-full bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-xl px-4 py-3 font-bold outline-none focus:border-blue-500" placeholder="Sender Number"><input type="text" id="fTrx" required class="w-full bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-xl px-4 py-3 font-black uppercase tracking-widest outline-none focus:border-blue-500" placeholder="TrxID"></div>

    <script>
        const swalDark = { background: 'var(--card)', color: 'var(--text)' };
        let user = null; try { const s = localStorage.getItem('user'); if(s) user = JSON.parse(s); } catch(e){}
        let allProducts = []; let cart = []; let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]'); let base64Avatar = ''; let showOnlyWishlist = false;

        // 1. Theme Logic
        function toggleTheme() {
            const body = document.body;
            if(body.classList.contains('dark')) { body.classList.remove('dark'); localStorage.setItem('theme', 'light'); document.getElementById('themeIcon').className = 'fa-solid fa-moon'; } 
            else { body.classList.add('dark'); localStorage.setItem('theme', 'dark'); document.getElementById('themeIcon').className = 'fa-solid fa-sun'; }
        }
        if(localStorage.getItem('theme') === 'light') toggleTheme();

        // 10. Hide Splash Screen & 9. Start Countdown
        window.addEventListener('load', () => { 
            setTimeout(() => { document.getElementById('splashScreen').style.opacity = '0'; setTimeout(()=>document.getElementById('splashScreen').style.display='none',500); }, 800);
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
            startFlashSaleTimer();
        });

        // 9. Countdown Timer
        function startFlashSaleTimer() {
            let time = 3600 * 5; // 5 hours fake timer
            setInterval(() => {
                let h = Math.floor(time / 3600); let m = Math.floor((time % 3600) / 60); let s = time % 60;
                document.getElementById('countdownTimer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                time > 0 ? time-- : time = 3600*5;
            }, 1000);
        }

        // 12. Scroll to Top logic
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('btnScrollTop');
            if (window.scrollY > 300) btn.classList.add('visible'); else btn.classList.remove('visible');
        });

        function getBadge(role) { return role === 'ADMIN' ? '<span class="r-badge badge-admin">ADMIN</span>' : '<span class="r-badge badge-basic">USER</span>'; }

        async function init() {
            renderAuth(); loadNotices();
            if(user && user.id) {
                try { const res = await fetch('/api/user/' + user.id); const data = await res.json();
                    if(data.success) { user = {...user, ...data}; localStorage.setItem('user', JSON.stringify(user)); renderAuth(); }
                    else if(data.banned) { Swal.fire('Banned', 'Account suspended.', 'error').then(()=>window.logout()); return; }
                } catch(e) {}
            }
            loadProducts();
        }

        async function loadNotices() {
            try { const res = await fetch('/api/notices'); const notices = await res.json();
                if(notices && notices.length > 0) { document.getElementById('noticeText').innerHTML = notices.map(n => `<span class="mx-10">• ${n.text}</span>`).join(''); document.getElementById('noticeBanner').classList.remove('hidden'); }
            } catch(e) {}
        }

        function renderAuth() {
            const authDiv = document.getElementById('authSection'); const mobNav = document.getElementById('mobileBottomNav');
            if(user) {
                const uName = user.name || user.firstName || 'User'; let avHtml = user.avatar ? `<img src="${user.avatar}" class="w-full h-full object-cover">` : `<span class="text-lg font-black">${uName.charAt(0).toUpperCase()}</span>`; let displayBal = `৳${parseFloat(user.balanceBdt).toFixed(0)}`;

        function removeFromCart(cartId) { cart = cart.filter(i => i.cartId !== cartId); renderCart(); updateCartBadge(); if(cart.length === 0) document.getElementById('addressSection').classList.add('hidden'); }
        
        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            if(cart.length === 0) { container.innerHTML = '<div class="text-center text-slate-500 py-10"><i class="fa-solid fa-cart-arrow-down text-4xl mb-3 opacity-50"></i><br><p class="font-bold">Cart is empty</p></div>'; document.getElementById('cartTotal').innerText = '৳0'; document.getElementById('cartDue').innerText = '৳0'; document.getElementById('cartAdvance').innerText = '- ৳0'; return; }
            document.getElementById('addressSection').classList.remove('hidden'); 
            let sum = 0; 
            container.innerHTML = cart.map(i => { 
                sum += i.price; let imgHtml = i.img ? `<img src="/api/photo/${i.img}" class="w-12 h-12 object-cover rounded-lg border border-[var(--border)]">` : `<div class="w-12 h-12 bg-[var(--bg)] rounded-lg flex items-center justify-center text-blue-500"><i class="fa-solid fa-box"></i></div>`; let variants = []; if(i.size) variants.push(`Size: ${i.size}`); if(i.color) variants.push(`Color: ${i.color}`); let varHtml = variants.length > 0 ? `<p class="text-[10px] text-blue-500 font-bold mt-1 bg-blue-500/10 px-2 py-0.5 rounded inline-block">${variants.join(', ')}</p>` : '';
                return `<div class="bg-[var(--card)] p-4 rounded-xl flex justify-between items-center border border-[var(--border)] shadow-sm"><div class="flex items-center gap-3">${imgHtml}<div><p class="font-bold text-sm leading-tight text-[var(--text)]">${i.name}</p>${varHtml}<p class="text-emerald-500 font-black mt-1">৳${i.price}</p></div></div><button onclick="removeFromCart(${i.cartId})" class="text-red-500 bg-red-500/10 hover:bg-red-500 hover:text-white w-8 h-8 rounded-full transition-colors flex justify-center items-center"><i class="fa-solid fa-trash text-xs"></i></button></div>`; 
            }).join('');
            document.getElementById('cartTotal').innerText = `৳${sum}`; let advance = sum > 0 ? 200 : 0; if(sum < 200) advance = sum; let due = sum - advance; document.getElementById('cartAdvance').innerText = `- ৳${advance}`; document.getElementById('cartDue').innerText = `৳${due}`;
        }
        
        async function processOrder() {
            if(cart.length === 0 || !user) return;
            const phone = document.getElementById('cPhone').value; const street = document.getElementById('cStreet').value; const city = document.getElementById('cCity').value; const zip = document.getElementById('cZip').value;

            try {
                const res = await fetch('/api/checkout', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId: user.id, cartItems: cart, address: { phone, street, city, postcode: zip }}) });
                const data = await res.json();
                if(data.success) {
                    user.balanceBdt = data.newBalance; localStorage.setItem('user', JSON.stringify(user)); cart = []; updateCartBadge(); toggleCart(); renderAuth(); renderProducts(allProducts); document.getElementById('addressSection').classList.add('hidden');
                    Swal.fire({ title: 'Order Sent! 🎉', html: `<p class="mb-2 text-sm">Advance Paid: <b>৳${data.advance}</b></p><p class="text-lg font-black text-emerald-500">Due (COD): ৳${data.due}</p><p class="text-xs text-blue-500 mt-3">Digital receipt sent to email.</p>`, icon: 'success', confirmButtonText: 'View Status', background:'var(--card)', color:'var(--text)' }).then((r) => { if(r.isConfirmed) openProfileDashboard('orders'); });
                } else Swal.fire({title:'Failed', text: data.error, icon:'error', background:'var(--card)', color:'var(--text)'});
            } catch(e) { Swal.fire('Error', 'Network Error', 'error'); }
        }

                    return `<div class="bg-[var(--bg)] border border-[var(--border)] p-5 rounded-2xl mb-4 shadow-sm"><div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-sm text-[var(--text)]">${p.product.name} <span class="text-blue-500 text-[10px] ml-1">${varStr}</span></h4><p class="text-[10px] text-slate-500 mt-1">Order #${p.id} • ${new Date(p.createdAt).toLocaleDateString()}</p></div><span class="text-xs font-black text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded-lg">৳${p.priceTotal}</span></div>${timeline}</div>`;
                }).join(''); 
            });
            fetch('/api/history/' + user.id).then(r=>r.json()).then(data => { document.getElementById('pFundsList').innerHTML = (!Array.isArray(data) || data.length === 0) ? '<p class="text-center text-slate-500 py-10">No transactions.</p>' : data.map(d => { let color = d.status === 'APPROVED' ? 'emerald' : d.status === 'REJECTED' ? 'red' : 'yellow'; return `<div class="bg-[var(--bg)] p-4 rounded-2xl flex justify-between items-center border border-[var(--border)] mb-3"><div><p class="font-black text-sm uppercase text-[var(--text)]">${d.method} <span class="text-blue-500 ml-1">৳${d.amountBdt}</span></p><p class="text-[10px] text-slate-500 font-mono mt-1">${d.trxId}</p></div><span class="bg-${color}-500/10 text-${color}-500 px-3 py-1 rounded-full text-[10px] font-black uppercase border border-${color}-500/20">${d.status}</span></div>`; }).join(''); });
        }
        function closeProfile() { document.getElementById('profileModal').classList.replace('flex', 'hidden'); }
        function switchProfTab(tab) { document.querySelectorAll('.prof-tab').forEach(b => { b.classList.remove('active', 'text-blue-500', 'border-blue-500'); b.classList.add('text-slate-500', 'border-transparent'); }); document.getElementById('tab-'+tab).classList.add('active', 'text-blue-500', 'border-blue-500'); document.getElementById('tab-'+tab).classList.remove('text-slate-500', 'border-transparent'); document.getElementById('sec-overview').classList.add('hidden'); document.getElementById('sec-orders').classList.add('hidden'); document.getElementById('sec-funds').classList.add('hidden'); document.getElementById('sec-settings').classList.add('hidden'); document.getElementById('sec-'+tab).classList.remove('hidden'); }
        
        document.getElementById('fileAvatar').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = function(event) { const img = new Image(); img.onload = function() {
                    const canvas = document.createElement('canvas'); let w = img.width; let h = img.height; if(w>256){h*=256/w; w=256;} canvas.width=w; canvas.height=h; const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,w,h);
                    base64Avatar = canvas.toDataURL('image/jpeg', 0.8); document.getElementById('settingAvatarPreview').innerHTML = `<img src="${base64Avatar}" class="w-full h-full object-cover">`;
                }; img.src = event.target.result;
            }; reader.readAsDataURL(file);
        });

        async function saveSettings() { const email = document.getElementById('setEmail').value; const password = document.getElementById('setPass').value; const btn = document.getElementById('btnSaveSet'); btn.innerText = "Saving..."; const res = await fetch('/api/user/update', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId: user.id, email, password, avatar: base64Avatar}) }); const data = await res.json(); btn.innerText = "Save Changes"; if(data.success) { user.email = email; user.avatar = base64Avatar; localStorage.setItem('user', JSON.stringify(user)); toast('success', 'Saved!'); openProfileDashboard('overview'); renderAuth(); } else Swal.fire('Error', data.error, 'error'); }
        function removeAvatar() { base64Avatar = ''; document.getElementById('settingAvatarPreview').innerHTML = `<span class="text-2xl font-black text-slate-500">${user.firstName.charAt(0).toUpperCase()}</span>`; saveSettings(); }

        // Fund logic
        function openFund() { if(!user) return location.href='/login'; document.getElementById('fundModal').classList.replace('hidden', 'flex'); document.getElementById('fBdt').value = ''; updateFundUI(); }
        function closeFund() { document.getElementById('fundModal').classList.replace('flex', 'hidden'); }
        function updateFundUI() { const method = document.querySelector('input[name="method"]:checked').value; const header = document.getElementById('fundHeader'); const btn = document.getElementById('fBtn'); const icon = document.getElementById('fundIcon'); let num = ''; header.className = 'p-6 flex justify-between items-center text-white shadow-md transition-colors'; btn.className = 'w-full text-white font-black py-4 rounded-xl uppercase tracking-widest transition-all'; if(method === 'bkash') { num = '01846849460'; header.classList.add('bg-[#e2136e]'); btn.classList.add('bg-[#e2136e]', 'hover:bg-[#b30b54]'); icon.className = 'fa-solid fa-paper-plane mr-2'; } else if(method === 'nagad') { num = '01846849460'; header.classList.add('bg-[#f37021]'); btn.classList.add('bg-[#f37021]', 'hover:bg-[#d65b15]'); icon.className = 'fa-solid fa-fire mr-2'; } document.getElementById('fNumber').innerText = num; }
        function copyNumber() { navigator.clipboard.writeText(document.getElementById('fNumber').innerText); toast('success', 'Copied!'); }

        document.getElementById('depositForm').addEventListener('submit', async (e) => { e.preventDefault(); const method = document.querySelector('input[name="method"]:checked').value; const amountBdt = parseFloat(document.getElementById('fBdt').value); const senderNumber = document.getElementById('fSender').value; const trxId = document.getElementById('fTrx').value; if(amountBdt <= 0) return; const btn = document.getElementById('fBtn'); btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>'; try { const res = await fetch('/api/deposit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: user.id, method, amountBdt, senderNumber, trxId }) }); if((await res.json()).success) { closeFund(); Swal.fire({title:'Request Sent!', text:'Track it in Profile > Wallet.', icon:'success', background:'var(--card)', color:'var(--text)'}).then(() => openProfileDashboard('funds')); document.getElementById('depositForm').reset(); document.getElementById('fBdt').value = ''; } else Swal.fire('Error', 'TrxID exists', 'error'); } catch(e) {} btn.innerHTML = 'SUBMIT REQUEST'; });

        window.logout = function() { localStorage.removeItem('user'); localStorage.removeItem('wishlist'); location.href='/login'; }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
