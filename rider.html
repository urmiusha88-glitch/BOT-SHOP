<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rider Panel | AURA DELIVERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050b14; color: white; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; color: white; outline: none; font-size: 16px; }
        .input-box:focus { border-color: #10b981; box-shadow: 0 0 15px rgba(16,185,129,0.3); }
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
        .tab-inactive { color: #64748b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
        
        .r-badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; letter-spacing: 1px; display: inline-block; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .badge-rookie { background: linear-gradient(135deg, #94a3b8, #475569, #94a3b8); color: white; }
        .badge-bronze { background: linear-gradient(135deg, #d97706, #78350f, #d97706); color: white; box-shadow: 0 0 10px rgba(217, 119, 6, 0.5); }
        .badge-silver { background: linear-gradient(135deg, #cbd5e1, #64748b, #cbd5e1); color: #0f172a; text-shadow: none; box-shadow: 0 0 10px rgba(203, 213, 225, 0.5); }
        .badge-gold { background: linear-gradient(135deg, #fbbf24, #b45309, #fbbf24); color: #451a03; text-shadow: none; box-shadow: 0 0 15px rgba(251, 191, 36, 0.6); }
        .badge-platinum { background: linear-gradient(135deg, #e2e8f0, #94a3b8, #f8fafc); color: #0f172a; text-shadow: none; box-shadow: 0 0 15px rgba(226, 232, 240, 0.6); }
        .badge-diamond { background: linear-gradient(135deg, #67e8f9, #0284c7, #a5f3fc); color: #082f49; text-shadow: none; box-shadow: 0 0 20px rgba(6, 182, 212, 0.8); }
        
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; cursor: pointer; } .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .nav-tab.active { color: #10b981; border-color: #10b981; }
    </style>
</head>
<body class="min-h-screen bg-[#050b14]">

    <div id="authSection" class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-4xl text-slate-900 mx-auto shadow-[0_0_30px_rgba(16,185,129,0.5)] mb-4">
                    <i class="fa-solid fa-motorcycle"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight text-white">RIDER <span class="text-emerald-400">PORTAL</span></h1>
            </div>

            <div class="glass-panel p-8 rounded-3xl shadow-2xl">
                <div class="flex gap-6 mb-6 border-b border-slate-700">
                    <button id="loginTab" onclick="switchTab('login')" class="pb-2 font-bold tab-active w-1/2">Login</button>
                    <button id="regTab" onclick="switchTab('reg')" class="pb-2 font-bold tab-inactive w-1/2 border-transparent border-b-2">Register</button>
                </div>

                <div id="loginForm" class="space-y-5 animate-[fadeIn_0.3s]">
                    <input type="email" id="lEmail" placeholder="Email Address" class="input-box w-full p-4 rounded-xl font-bold">
                    <input type="password" id="lPass" placeholder="Password" class="input-box w-full p-4 rounded-xl font-bold">
                    <button onclick="login()" id="btnLogin" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-xl uppercase tracking-widest transition-colors shadow-[0_0_15px_rgba(16,185,129,0.4)] mt-2 active:scale-95">Login</button>
                </div>

                <div id="regForm" class="hidden space-y-5 animate-[fadeIn_0.3s]">
                    <input type="text" id="rName" placeholder="Full Name" class="input-box w-full p-4 rounded-xl font-bold">
                    <input type="tel" id="rPhone" placeholder="Phone Number" class="input-box w-full p-4 rounded-xl font-bold">
                    <input type="email" id="rEmail" placeholder="Email Address" class="input-box w-full p-4 rounded-xl font-bold">
                    <input type="password" id="rPass" placeholder="Password" class="input-box w-full p-4 rounded-xl font-bold">
                    <button onclick="register()" id="btnReg" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-black py-4 rounded-xl uppercase tracking-widest mt-2 active:scale-95 shadow-lg">Register</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashSection" class="hidden flex-col h-screen w-full fixed inset-0 bg-[#050b14]">
        
        <div class="shrink-0 bg-slate-900 border-b border-slate-800 shadow-lg z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-2xl text-slate-900 overflow-hidden border-2 border-emerald-400 shadow-lg" id="topAvatar">
                        <i class="fa-solid fa-motorcycle"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black leading-tight text-white" id="riderNameDisplay">Rider</h2>
                        <p class="text-xs text-emerald-400 font-bold uppercase tracking-widest mt-0.5" id="riderBadgeDisplay">Rookie</p>
                    </div>
                </div>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl font-bold transition-colors active:scale-95"><i class="fa-solid fa-power-off sm:mr-2"></i><span class="hidden sm:inline">Logout</span></button>
            </div>
        </div>

        <div class="shrink-0 bg-slate-900/50 border-b border-slate-800 z-40 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-4 flex justify-center sm:justify-start gap-4 sm:gap-8 pt-3">
                <button onclick="switchDashTab('active')" id="dtab-active" class="nav-tab active pb-3 px-2 sm:px-4 font-bold text-xs sm:text-sm uppercase tracking-widest border-b-2 border-emerald-500 transition-colors">Active Orders</button>
                <button onclick="switchDashTab('history')" id="dtab-history" class="nav-tab text-slate-500 pb-3 px-2 sm:px-4 font-bold text-xs sm:text-sm uppercase tracking-widest border-b-2 border-transparent transition-colors">History</button>
                <button onclick="switchDashTab('profile')" id="dtab-profile" class="nav-tab text-slate-500 pb-3 px-2 sm:px-4 font-bold text-xs sm:text-sm uppercase tracking-widest border-b-2 border-transparent transition-colors">Profile</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="max-w-7xl mx-auto w-full p-4 sm:p-6 lg:p-8">
                
                <div id="view-active" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20 animate-[fadeIn_0.3s]"></div>

                <div id="view-history" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20 animate-[fadeIn_0.3s]"></div>

                <div id="view-profile" class="hidden max-w-2xl mx-auto pb-20 animate-[fadeIn_0.3s]">
                    <div class="glass-panel p-6 sm:p-10 rounded-[32px] shadow-2xl text-center">
                        <div class="w-32 h-32 bg-slate-800 rounded-full mx-auto flex items-center justify-center text-5xl text-white font-black shadow-[0_0_20px_rgba(16,185,129,0.3)] mb-4 overflow-hidden border-4 border-slate-700" id="profAvatar"></div>
                        <div id="profBadgeHtml" class="mb-4"></div>
                        <h3 class="text-3xl font-black mb-1 text-white" id="profName">Name</h3>
                        <p class="text-slate-400 font-bold text-sm mb-8" id="profEmail">email</p>

                        <div class="grid grid-cols-2 gap-4 mb-10">
                            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2">Total Delivered</p>
                                <p class="text-4xl font-black text-emerald-400" id="profCount">0</p>
                            </div>
                            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2">Next Rank</p>
                                <p class="text-lg font-black text-blue-400 mt-2" id="profNext">10 left</p>
                            </div>
                        </div>

                        <div class="text-left space-y-5 bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                            <h3 class="font-black text-xl text-white mb-4 flex items-center"><i class="fa-solid fa-gear text-emerald-500 mr-3"></i> Settings</h3>
                            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex items-center justify-between">
                                <p class="font-bold text-sm text-slate-300">Update Profile Picture</p>
                                <div class="upload-btn-wrapper">
                                    <button class="bg-emerald-600/20 text-emerald-400 px-4 py-2 rounded-lg text-xs font-bold transition-colors hover:bg-emerald-600 hover:text-white">Choose Image</button>
                                    <input type="file" id="fileAvatar" accept="image/*" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                                <input type="email" id="setEmail" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-5 py-4 font-bold outline-none text-white focus:border-emerald-500 transition-colors">
                            </div>
                            <div>
                                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Change Password</label>
                                <input type="password" id="setPass" placeholder="Leave blank to keep current" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-5 py-4 font-bold outline-none text-white focus:border-emerald-500 transition-colors">
                            </div>
                            <button onclick="saveSettings()" id="btnSaveSet" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-widest mt-2 shadow-[0_0_15px_rgba(59,130,246,0.4)] active:scale-95 transition-all">Save Changes</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const swalDark = { background: '#1e293b', color: '#fff' };
        let rider = null; try { const r = localStorage.getItem('riderSession'); if(r) rider = JSON.parse(r); } catch(e){}
        let base64Avatar = '';

        if(rider && rider.id) { loadRiderData(); }

        function switchTab(t) {
            document.getElementById('loginForm').classList.add('hidden'); document.getElementById('regForm').classList.add('hidden');
            document.getElementById('loginTab').className = 'pb-2 font-bold tab-inactive border-transparent border-b-2 w-1/2'; 
            document.getElementById('regTab').className = 'pb-2 font-bold tab-inactive border-transparent border-b-2 w-1/2';
            if(t === 'login') { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('loginTab').className = 'pb-2 font-bold tab-active w-1/2'; }
            else { document.getElementById('regForm').classList.remove('hidden'); document.getElementById('regTab').className = 'pb-2 font-bold tab-active w-1/2'; }
        }

        function switchDashTab(t) {
            ['active', 'history', 'profile'].forEach(tab => {
                document.getElementById('view-'+tab).classList.add('hidden');
                let btn = document.getElementById('dtab-'+tab);
                btn.classList.remove('active', 'border-emerald-500', 'text-white'); btn.classList.add('text-slate-500', 'border-transparent');
            });
            
            // Remove 'hidden' so the grid class takes over
            document.getElementById('view-'+t).classList.remove('hidden');
            
            let activeBtn = document.getElementById('dtab-'+t);
            activeBtn.classList.remove('text-slate-500', 'border-transparent'); activeBtn.classList.add('active', 'border-emerald-500', 'text-white');
            
            if(t === 'active') fetchOrders();
            if(t === 'history') fetchHistory();
        }

        function getRiderBadge(count) {
            if(count >= 100) return { html: '<span class="r-badge badge-diamond"><i class="fa-solid fa-gem mr-1"></i> DIAMOND RIDER</span>', name: 'Diamond' };
            if(count >= 50) return { html: '<span class="r-badge badge-platinum"><i class="fa-solid fa-star mr-1"></i> PLATINUM RIDER</span>', name: 'Platinum' };
            if(count >= 30) return { html: '<span class="r-badge badge-gold"><i class="fa-solid fa-medal mr-1"></i> GOLD RIDER</span>', name: 'Gold' };
            if(count >= 20) return { html: '<span class="r-badge badge-silver"><i class="fa-solid fa-medal mr-1"></i> SILVER RIDER</span>', name: 'Silver' };
            if(count >= 10) return { html: '<span class="r-badge badge-bronze"><i class="fa-solid fa-medal mr-1"></i> BRONZE RIDER</span>', name: 'Bronze' };
            return { html: '<span class="r-badge badge-rookie"><i class="fa-solid fa-seedling mr-1"></i> ROOKIE</span>', name: 'Rookie' };
        }

        function getNextRankInfo(count) {
            if(count < 10) return `${10 - count} to Bronze`;
            if(count < 20) return `${20 - count} to Silver`;
            if(count < 30) return `${30 - count} to Gold`;
            if(count < 50) return `${50 - count} to Platinum`;
            if(count < 100) return `${100 - count} to Diamond`;
            return 'Max Rank Achieved!';
        }

        async function loadRiderData() {
            const res = await fetch('/api/rider/me', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({riderId: rider.id}) });
            const data = await res.json();
            if(data.success) {
                rider = data.rider; localStorage.setItem('riderSession', JSON.stringify(rider));
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden'); document.getElementById('dashSection').classList.add('flex');
                
                document.getElementById('riderNameDisplay').innerText = rider.name;
                const badge = getRiderBadge(rider.deliveryCount);
                document.getElementById('riderBadgeDisplay').innerText = badge.name;
                
                let avHtml = rider.avatar ? `<img src="${rider.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-motorcycle"></i>`;
                document.getElementById('topAvatar').innerHTML = avHtml;
                document.getElementById('profAvatar').innerHTML = rider.avatar ? `<img src="${rider.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user-astronaut text-slate-500"></i>`;
                
                document.getElementById('profName').innerText = rider.name;
                document.getElementById('profEmail').innerText = rider.email;
                document.getElementById('profCount').innerText = rider.deliveryCount;
                document.getElementById('profBadgeHtml').innerHTML = badge.html;
                document.getElementById('profNext').innerText = getNextRankInfo(rider.deliveryCount);
                
                document.getElementById('setEmail').value = rider.email;
                base64Avatar = rider.avatar || '';

                fetchOrders();
            } else { logout(); }
        }

        async function login() { 
            const email = document.getElementById('lEmail').value; const password = document.getElementById('lPass').value;
            if(!email || !password) return; const btn = document.getElementById('btnLogin'); btn.innerText = "Checking...";
            const res = await fetch('/api/rider/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, password}) }); 
            const data = await res.json(); btn.innerText = "LOGIN";
            if(data.success) { rider = { id: data.rider.id }; loadRiderData(); } 
            else { Swal.fire({toast:true, position:'top-end', icon:'error', title: data.error || 'Login Failed'}); } 
        }

        async function register() { 
            const name = document.getElementById('rName').value; const phone = document.getElementById('rPhone').value; const email = document.getElementById('rEmail').value; const password = document.getElementById('rPass').value;
            if(!name || !email || !phone || !password) return; const btn = document.getElementById('btnReg'); btn.innerText = "Creating...";
            const res = await fetch('/api/rider/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, phone, email, password}) }); 
            const data = await res.json(); btn.innerText = "REGISTER";
            if(data.success) { Swal.fire({title: 'Verification Sent!', text: data.message, icon: 'success', ...swalDark}); switchTab('login'); } 
            else { Swal.fire({title: 'Error', text: data.error || 'Registration failed', icon: 'error', ...swalDark}); } 
        }

        async function fetchOrders() {
            const container = document.getElementById('view-active'); container.innerHTML = '<div class="col-span-full text-center text-slate-500 font-bold mt-20"><i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i><br>Finding Orders...</div>';
            try {
                const res = await fetch('/api/rider/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({riderId: rider.id}) });
                const data = await res.json();
                if(data.orders.length === 0) { container.innerHTML = '<div class="col-span-full text-center text-slate-500 mt-24"><i class="fa-solid fa-box-open text-6xl mb-4 opacity-30"></i><h3 class="text-xl font-black text-white">No Active Deliveries</h3><p class="text-sm mt-2">All assigned orders are completed.</p></div>'; return; }
                
                container.innerHTML = data.orders.map(o => {
                    let varText = []; if(o.selectedSize) varText.push(o.selectedSize); if(o.selectedColor) varText.push(o.selectedColor); let varStr = varText.length>0 ? `[${varText.join(' - ')}]` : '';
                    return `
                    <div class="glass-panel p-6 rounded-3xl relative overflow-hidden shadow-lg border border-slate-700/50 flex flex-col justify-between h-full">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-emerald-500"></div>
                        
                        <div>
                            <div class="flex justify-between items-start mb-5">
                                <div>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Order #${o.id}</p>
                                    <h3 class="font-black text-xl leading-tight text-white">${o.user.firstName}</h3>
                                </div>
                                <a href="tel:${o.phone}" class="bg-blue-600 hover:bg-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-transform active:scale-95 text-xl"><i class="fa-solid fa-phone"></i></a>
                            </div>
                            
                            <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700 mb-5">
                                <p class="text-sm text-slate-300 leading-relaxed"><i class="fa-solid fa-location-dot text-red-500 mr-2 text-lg align-middle"></i> ${o.street}, ${o.city} <br><span class="ml-7 text-slate-500 font-mono text-xs mt-1 inline-block">ZIP: ${o.postcode}</span></p>
                            </div>
                            
                            <div class="mb-6 pb-5 border-b border-slate-700">
                                <p class="text-base font-bold text-slate-200 leading-snug"><i class="fa-solid fa-box text-blue-400 mr-2"></i> ${o.product ? o.product.name : 'Unknown Product'} <span class="text-[11px] text-emerald-400 bg-emerald-900/30 px-2 py-1 rounded ml-1 mt-2 inline-block">${varStr}</span></p>
                            </div>
                        </div>
                        
                        <div>
                            <div class="flex justify-between items-end mb-5">
                                <div>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Collect Cash (COD)</p>
                                    <p class="text-4xl font-black text-emerald-400 tracking-tight">৳${o.dueCod}</p>
                                </div>
                            </div>
                            
                            <button onclick="confirmDelivery(${o.id}, ${o.dueCod})" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-transform active:scale-95 text-sm"><i class="fa-solid fa-shield-halved mr-2"></i> Verify & Deliver</button>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { container.innerHTML = '<div class="col-span-full text-center text-red-400 font-bold mt-20">Connection Error.</div>'; }
        }

        async function fetchHistory() {
            const container = document.getElementById('view-history'); container.innerHTML = '<div class="col-span-full text-center text-slate-500 font-bold mt-20"><i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i><br>Loading History...</div>';
            try {
                const res = await fetch('/api/rider/history', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({riderId: rider.id}) });
                const data = await res.json();
                if(data.history.length === 0) { container.innerHTML = '<div class="col-span-full text-center text-slate-500 mt-24"><i class="fa-solid fa-clock-rotate-left text-6xl mb-4 opacity-30"></i><h3 class="text-xl font-black text-white">No History</h3><p class="text-sm mt-2">Start delivering to build your profile.</p></div>'; return; }
                
                container.innerHTML = data.history.map(o => {
                    const d = new Date(o.createdAt).toLocaleDateString();
                    return `
                    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-md flex flex-col justify-between">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-lg text-white mb-1">${o.user.firstName}</h4>
                                <p class="text-[11px] text-slate-400 font-mono">ID: #${o.id} • ${d}</p>
                            </div>
                            <span class="bg-emerald-900/40 text-emerald-400 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase border border-emerald-500/20"><i class="fa-solid fa-check mr-1"></i> Delivered</span>
                        </div>
                        <div class="bg-slate-900/80 p-4 rounded-xl flex justify-between items-center">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cash Collected</span>
                            <span class="text-xl font-black text-emerald-400">৳${o.dueCod}</span>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { container.innerHTML = '<div class="col-span-full text-center text-red-400 font-bold mt-20">Connection Error.</div>'; }
        }

        function confirmDelivery(orderId, amount) {
            Swal.fire({ title: 'Send OTP?', html: `Verification code will be sent to the customer's email. You need to collect <b class="text-emerald-400 text-3xl block mt-3">৳${amount}</b>`, icon: 'question', showCancelButton: true, confirmButtonColor: '#3b82f6', cancelButtonColor: '#ef4444', confirmButtonText: 'Send Code', cancelButtonText: 'Cancel', ...swalDark }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Sending Email...', text: 'Please wait...', didOpen: ()=>Swal.showLoading(), allowOutsideClick: false, ...swalDark});
                    const res = await fetch('/api/rider/send-otp', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({riderId: rider.id, orderId}) });
                    const data = await res.json();
                    
                    if(data.success) {
                        const { value: otp } = await Swal.fire({ title: 'Enter OTP Code', input: 'text', inputLabel: "Ask the customer for the 6-digit code", inputPlaceholder: 'e.g. 123456', showCancelButton: true, confirmButtonColor: '#10b981', confirmButtonText: 'Verify & Finish', inputValidator: (value) => { if (!value) return 'Code is required!' }, ...swalDark });
                        
                        if(otp) {
                            Swal.fire({title: 'Verifying...', didOpen: ()=>Swal.showLoading(), allowOutsideClick: false, ...swalDark});
                            const verifyRes = await fetch('/api/rider/order/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({riderId: rider.id, orderId, otp}) });
                            const verifyData = await verifyRes.json();
                            
                            if(verifyData.success) { 
                                Swal.fire({title: 'Awesome! 🎉', text: 'Delivery completed successfully.', icon: 'success', ...swalDark}); 
                                loadRiderData(); 
                            } 
                            else { Swal.fire('Error', verifyData.error || 'Failed to verify.', 'error', ...swalDark); }
                        }
                    } else { Swal.fire('Error', data.error || 'Failed to send OTP.', 'error', ...swalDark); }
                }
            });
        }

        document.getElementById('fileAvatar').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = function(event) { const img = new Image(); img.onload = function() {
                    const canvas = document.createElement('canvas'); let w = img.width; let h = img.height; if(w>256){h*=256/w; w=256;} canvas.width=w; canvas.height=h; const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,w,h);
                    base64Avatar = canvas.toDataURL('image/jpeg', 0.8); document.getElementById('profAvatar').innerHTML = `<img src="${base64Avatar}" class="w-full h-full object-cover">`;
                }; img.src = event.target.result;
            }; reader.readAsDataURL(file);
        });

        async function saveSettings() {
            const email = document.getElementById('setEmail').value; const password = document.getElementById('setPass').value;
            const btn = document.getElementById('btnSaveSet'); btn.innerText = "Saving...";
            const res = await fetch('/api/rider/update', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({riderId: rider.id, email, password, avatar: base64Avatar}) }); 
            const data = await res.json(); btn.innerText = "Save Profile";
            if(data.success) { toast('success', 'Profile Updated!'); loadRiderData(); } else Swal.fire({title:'Error', icon:'error', ...swalDark}); 
        }

        function logout() { localStorage.removeItem('riderSession'); location.reload(); }
    </script>
</body>
</html>
