<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Panel | AURA DELIVERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; color: white; outline: none; }
        .input-box:focus { border-color: #10b981; box-shadow: 0 0 15px rgba(16,185,129,0.3); }
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
        .tab-inactive { color: #64748b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="authSection" class="w-full max-w-sm mt-10">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-4xl text-white mx-auto shadow-[0_0_30px_rgba(16,185,129,0.5)] mb-4">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight">RIDER <span class="text-emerald-400">PORTAL</span></h1>
        </div>

        <div class="glass-panel p-6 rounded-3xl shadow-2xl">
            <div class="flex gap-6 mb-6 border-b border-slate-700">
                <button id="loginTab" onclick="switchTab('login')" class="pb-2 font-bold tab-active">Login</button>
                <button id="regTab" onclick="switchTab('reg')" class="pb-2 font-bold tab-inactive">Register</button>
            </div>

            <div id="loginForm" class="space-y-4">
                <input type="email" id="lEmail" placeholder="Email Address" class="input-box w-full p-4 rounded-xl font-bold">
                <input type="password" id="lPass" placeholder="Password" class="input-box w-full p-4 rounded-xl font-bold">
                <button onclick="login()" id="btnLogin" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-xl uppercase tracking-widest transition-colors shadow-lg mt-2">Login</button>
            </div>

            <div id="regForm" class="hidden space-y-4">
                <input type="text" id="rName" placeholder="Full Name" class="input-box w-full p-4 rounded-xl font-bold">
                <input type="text" id="rPhone" placeholder="Phone Number" class="input-box w-full p-4 rounded-xl font-bold">
                <input type="email" id="rEmail" placeholder="Real Email Address" class="input-box w-full p-4 rounded-xl font-bold">
                <input type="password" id="rPass" placeholder="Password" class="input-box w-full p-4 rounded-xl font-bold">
                <button onclick="register()" id="btnReg" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-black py-4 rounded-xl uppercase tracking-widest mt-2">Register</button>
            </div>
        </div>
    </div>

    <div id="dashSection" class="w-full max-w-md hidden flex-col h-full absolute inset-0 bg-[#0f172a] overflow-y-auto">
        <div class="flex justify-between items-center bg-slate-900 p-4 border-b border-slate-800 shadow-lg sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-motorcycle"></i></div>
                <div>
                    <h2 class="font-black leading-tight" id="riderNameDisplay">Deliveries</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Active Orders</p>
                </div>
            </div>
            <button onclick="logout()" class="text-red-500 p-2 hover:bg-slate-800 rounded-lg transition-colors"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="ordersContainer" class="space-y-4 p-4 pb-10"></div>
    </div>

    <script>
        const swalDark = { background: '#1e293b', color: '#fff' };
        let rider = null; try { const r = localStorage.getItem('rider'); if(r) rider = JSON.parse(r); } catch(e){}
        
        if(rider && rider.id) { fetchOrders(); }

        function switchTab(t) {
            document.getElementById('loginForm').classList.add('hidden'); document.getElementById('regForm').classList.add('hidden');
            document.getElementById('loginTab').className = 'pb-2 font-bold tab-inactive'; document.getElementById('regTab').className = 'pb-2 font-bold tab-inactive';
            if(t === 'login') { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('loginTab').className = 'pb-2 font-bold tab-active'; }
            else { document.getElementById('regForm').classList.remove('hidden'); document.getElementById('regTab').className = 'pb-2 font-bold tab-active'; }
        }

        async function login() { 
            const email = document.getElementById('lEmail').value; const password = document.getElementById('lPass').value;
            if(!email || !password) return;
            const btn = document.getElementById('btnLogin'); btn.innerText = "Checking...";
            const res = await fetch('/api/rider/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, password}) }); 
            const data = await res.json();
            btn.innerText = "LOGIN";
            if(data.success) { rider = data.rider; localStorage.setItem('rider', JSON.stringify(rider)); fetchOrders(); } 
            else { Swal.fire({toast:true, position:'top-end', icon:'error', title: data.error || 'Login Failed'}); } 
        }

        async function register() { 
            const name = document.getElementById('rName').value; const phone = document.getElementById('rPhone').value; const email = document.getElementById('rEmail').value; const password = document.getElementById('rPass').value;
            if(!name || !email || !phone || !password) return;
            const btn = document.getElementById('btnReg'); btn.innerText = "Creating...";
            const res = await fetch('/api/rider/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, phone, email, password}) }); 
            const data = await res.json();
            btn.innerText = "REGISTER";
            if(data.success) { Swal.fire({title: 'Verification Sent!', text: data.message, icon: 'success', ...swalDark}); switchTab('login'); } 
            else { Swal.fire({title: 'Error', text: data.error || 'Registration failed', icon: 'error', ...swalDark}); } 
        }

        async function fetchOrders() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashSection').classList.remove('hidden');
            document.getElementById('dashSection').classList.add('flex');
            document.getElementById('riderNameDisplay').innerText = rider.name;

            const container = document.getElementById('ordersContainer');
            container.innerHTML = '<p class="text-center text-slate-500 font-bold mt-10"><i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i><br>Loading Deliveries...</p>';

            try {
                const res = await fetch('/api/rider/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({riderId: rider.id}) });
                const data = await res.json();
                
                if(!data.success) { logout(); return; }

                if(data.orders.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-500 mt-20"><i class="fa-solid fa-box-open text-5xl mb-4 opacity-50"></i><h3 class="text-xl font-black">No Active Deliveries</h3><p class="text-sm">You have delivered all shipped orders.</p></div>';
                    return;
                }

                container.innerHTML = data.orders.map(o => {
                    let varText = []; if(o.selectedSize) varText.push(o.selectedSize); if(o.selectedColor) varText.push(o.selectedColor);
                    let varStr = varText.length>0 ? `[${varText.join(' - ')}]` : '';

                    return `
                    <div class="glass-panel p-5 rounded-3xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                        
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Order #${o.id}</p>
                                <h3 class="font-black text-lg leading-tight">${o.user.firstName}</h3>
                            </div>
                            <a href="tel:${o.phone}" class="bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-transform active:scale-95"><i class="fa-solid fa-phone"></i></a>
                        </div>

                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 mb-4">
                            <p class="text-xs text-slate-300 leading-relaxed"><i class="fa-solid fa-location-dot text-red-500 mr-2"></i> ${o.street}, ${o.city} - ${o.postcode}</p>
                        </div>

                        <div class="mb-5 pb-4 border-b border-slate-700">
                            <p class="text-sm font-bold text-slate-200"><i class="fa-solid fa-box text-blue-400 mr-2"></i> ${o.product ? o.product.name : 'Unknown Product'} <span class="text-[10px] text-slate-400 font-normal ml-1">${varStr}</span></p>
                        </div>

                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Collect Cash (COD)</p>
                                <p class="text-3xl font-black text-emerald-400">৳${o.dueCod}</p>
                            </div>
                        </div>

                        <button onclick="confirmDelivery(${o.id}, ${o.dueCod})" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-transform active:scale-95"><i class="fa-solid fa-shield-halved mr-2"></i> Verify & Deliver</button>
                    </div>`;
                }).join('');

            } catch(e) { container.innerHTML = '<p class="text-center text-red-400 font-bold mt-10">Connection Error.</p>'; }
        }

        // 🔥 OTP LOGIC WITH RIDER DATA
        function confirmDelivery(orderId, amount) {
            Swal.fire({
                title: 'Send OTP?',
                html: `A verification code and receipt will be sent to the customer's email. Collect <b class="text-emerald-400 text-xl">৳${amount}</b> cash.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Yes, Send OTP',
                ...swalDark
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Sending Email...', didOpen: ()=>Swal.showLoading(), allowOutsideClick: false, ...swalDark});
                    
                    const res = await fetch('/api/rider/send-otp', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({riderId: rider.id, orderId}) });
                    const data = await res.json();
                    
                    if(data.success) {
                        const { value: otp } = await Swal.fire({
                            title: 'Enter OTP Code',
                            input: 'text',
                            inputLabel: "Ask the customer for the 6-digit code from their email",
                            inputPlaceholder: 'e.g. 123456',
                            showCancelButton: true,
                            confirmButtonColor: '#10b981',
                            confirmButtonText: 'Verify & Complete',
                            inputValidator: (value) => { if (!value) return 'You need to enter the code!' },
                            ...swalDark
                        });
                        
                        if(otp) {
                            Swal.fire({title: 'Verifying...', didOpen: ()=>Swal.showLoading(), allowOutsideClick: false, ...swalDark});
                            
                            const verifyRes = await fetch('/api/rider/order/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({riderId: rider.id, orderId, otp}) });
                            const verifyData = await verifyRes.json();
                            
                            if(verifyData.success) {
                                Swal.fire({title: 'Success!', text: 'Order marked as Delivered.', icon: 'success', ...swalDark});
                                fetchOrders(); 
                            } else {
                                Swal.fire('Error', verifyData.error || 'Failed to verify.', 'error', ...swalDark);
                            }
                        }
                    } else {
                        Swal.fire('Error', data.error || 'Failed to send OTP.', 'error', ...swalDark);
                    }
                }
            });
        }

        function logout() { localStorage.removeItem('rider'); location.reload(); }
    </script>
</body>
</html>
